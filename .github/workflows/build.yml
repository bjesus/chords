name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libsqlite3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release --bin chords

      - name: Package .deb
        run: |
          mkdir -p pkg/DEBIAN pkg/usr/bin pkg/usr/share/glib-2.0/schemas pkg/usr/share/applications pkg/usr/share/icons/hicolor/scalable/apps
          cp target/release/chords pkg/usr/bin/
          cp data/de.chords.Chords.gschema.xml pkg/usr/share/glib-2.0/schemas/
          cp data/de.chords.Chords.svg pkg/usr/share/icons/hicolor/scalable/apps/
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          printf '[Desktop Entry]\nName=Chords\nComment=Guitar chords viewer\nExec=chords\nIcon=de.chords.Chords\nTerminal=false\nType=Application\nCategories=Audio;Music;\n' > pkg/usr/share/applications/de.chords.Chords.desktop
          printf 'Package: chords\nVersion: %s\nSection: sound\nPriority: optional\nArchitecture: amd64\nDepends: libgtk-4-1 (>= 4.10), libadwaita-1-0 (>= 1.5)\nMaintainer: bjesus <github@yoavmoshe.com>\nDescription: A native GNOME guitar chords viewer\n Browse, search, and save guitar chord sheets.\n' "$VERSION" > pkg/DEBIAN/control
          printf '#!/bin/sh\nglib-compile-schemas /usr/share/glib-2.0/schemas/ 2>/dev/null || true\ngtk-update-icon-cache -qtf /usr/share/icons/hicolor 2>/dev/null || true\n' > pkg/DEBIAN/postinst
          chmod 755 pkg/DEBIAN/postinst
          dpkg-deb --build pkg "chords_${VERSION}_amd64.deb"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: chords-deb
          path: chords_*.deb

  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libsqlite3-dev \
            libfuse2 file desktop-file-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-appimage-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/glib-2.0/schemas AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/scalable/apps
          cp target/release/chords AppDir/usr/bin/
          cp data/de.chords.Chords.gschema.xml AppDir/usr/share/glib-2.0/schemas/
          glib-compile-schemas AppDir/usr/share/glib-2.0/schemas/
          printf '[Desktop Entry]\nName=Chords\nComment=Guitar chords viewer\nExec=chords\nIcon=de.chords.Chords\nTerminal=false\nType=Application\nCategories=Audio;Music;\n' > AppDir/usr/share/applications/de.chords.Chords.desktop
          cp data/de.chords.Chords.svg AppDir/usr/share/icons/hicolor/scalable/apps/de.chords.Chords.svg

      - name: Build AppImage
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          DEPLOY_GTK_VERSION=4 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/de.chords.Chords.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/de.chords.Chords.svg \
            --plugin gtk \
            --output appimage
          mv Chords-*.AppImage chords-${VERSION}-x86_64.AppImage || true

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: chords-appimage
          path: chords-*.AppImage

  release:
    if: github.event_name == 'release'
    needs: [build-ubuntu, build-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chords-deb/*.deb
            chords-appimage/*.AppImage
