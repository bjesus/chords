name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libsqlite3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Package .deb
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/glib-2.0/schemas
          mkdir -p pkg/usr/share/applications

          cp target/release/chords pkg/usr/bin/

          cp data/de.chords.Chords.gschema.xml pkg/usr/share/glib-2.0/schemas/

          cat > pkg/usr/share/applications/de.chords.Chords.desktop << 'EOF'
          [Desktop Entry]
          Name=Chords
          Comment=Guitar chords viewer
          Exec=chords
          Icon=emblem-music-symbolic
          Terminal=false
          Type=Application
          Categories=Audio;Music;
          EOF

          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          cat > pkg/DEBIAN/control << EOF
          Package: chords
          Version: ${VERSION}
          Section: sound
          Priority: optional
          Architecture: amd64
          Depends: libgtk-4-1 (>= 4.10), libadwaita-1-0 (>= 1.5)
          Maintainer: bjesus <github@yoavmoshe.com>
          Description: A native GNOME guitar chords viewer
           Browse, search, and save guitar chord sheets.
          EOF

          cat > pkg/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          glib-compile-schemas /usr/share/glib-2.0/schemas/ 2>/dev/null || true
          EOF
          chmod 755 pkg/DEBIAN/postinst

          dpkg-deb --build pkg chords_${VERSION}_amd64.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: chords-deb
          path: chords_*.deb

  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libsqlite3-dev \
            libfuse2 file desktop-file-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-appimage-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh

      - name: Create AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/glib-2.0/schemas
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          cp target/release/chords AppDir/usr/bin/

          cp data/de.chords.Chords.gschema.xml AppDir/usr/share/glib-2.0/schemas/
          glib-compile-schemas AppDir/usr/share/glib-2.0/schemas/

          cat > AppDir/usr/share/applications/de.chords.Chords.desktop << 'EOF'
          [Desktop Entry]
          Name=Chords
          Comment=Guitar chords viewer
          Exec=chords
          Icon=de.chords.Chords
          Terminal=false
          Type=Application
          Categories=Audio;Music;
          EOF

          # Simple SVG icon
          cat > AppDir/usr/share/icons/hicolor/scalable/apps/de.chords.Chords.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
            <rect width="128" height="128" rx="16" fill="#3584e4"/>
            <text x="64" y="80" text-anchor="middle" font-family="serif" font-size="72" fill="white">♪</text>
          </svg>
          SVGEOF

      - name: Build AppImage
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          DEPLOY_GTK_VERSION=4 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/de.chords.Chords.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/scalable/apps/de.chords.Chords.svg \
            --plugin gtk \
            --output appimage
          mv Chords-*.AppImage chords-${VERSION}-x86_64.AppImage || true

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: chords-appimage
          path: chords-*.AppImage

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-ubuntu, build-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            chords-deb/*.deb
            chords-appimage/*.AppImage
