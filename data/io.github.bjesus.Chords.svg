<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f6f5f4" />
    </linearGradient>
  </defs>

  <!-- Drop Shadows -->
  <rect x="12" y="20" width="104" height="100" rx="12" fill="#000000" opacity="0.05" />
  <rect x="12" y="18" width="104" height="100" rx="12" fill="#000000" opacity="0.05" />

  <!-- Paper Profile (Bottom Edge) -->
  <rect x="12" y="16" width="104" height="100" rx="12" fill="#deddda" />

  <!-- Paper Surface -->
  <rect x="12" y="12" width="104" height="100" rx="12" fill="url(#paperGrad)" />

  <!-- Staff Lines -->
  <path d="M 24 36 L 104 36 M 24 48 L 104 48 M 24 60 L 104 60 M 24 72 L 104 72 M 24 84 L 104 84" stroke="#77767b" stroke-width="2" stroke-linecap="round" />

  <!-- Bookmark Shadow -->
  <path d="M 60 12 L 76 12 L 76 52 L 68 44 L 60 52 Z" fill="#000000" opacity="0.1" transform="translate(0, 2)" />

  <!-- Bookmark Main Surface -->
  <path d="M 60 12 L 76 12 L 76 52 L 68 44 L 60 52 Z" fill="#e01b24" />

  <!-- Bookmark Bottom Profile (Thickness) -->
  <path d="M 60 52 L 68 44 L 76 52 L 76 54 L 68 46 L 60 54 Z" fill="#a51d2d" />

  <!-- Ledger Line for Middle C -->
  <path d="M 74 96 L 102 96" stroke="#77767b" stroke-width="2" stroke-linecap="round" />

  <!-- C Major Chord (C, E, G) -->
  <g stroke="#241f31" stroke-width="2.5" fill="none">
    <ellipse cx="88" cy="96" rx="8" ry="5.5" transform="rotate(-15 88 96)" />
    <ellipse cx="88" cy="84" rx="8" ry="5.5" transform="rotate(-15 88 84)" />
    <ellipse cx="88" cy="72" rx="8" ry="5.5" transform="rotate(-15 88 72)" />
  </g>

  <!-- Treble Clef (G Clef) -->
  <g transform="translate(40, 72)">
    <path d="M -6 24 C 2 24, 2 12, 0 2 L 0 -44 C 0 -60, 14 -60, 14 -44 C 14 -28, -16 -16, -16 0 C -16 18, 10 18, 10 0 C 10 -16, -6 -16, -6 0" stroke="#241f31" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="-6" cy="24" r="4" fill="#241f31" />
  </g>
</svg>
